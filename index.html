<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Приглашение</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Marck+Script&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="bg-canvas"></canvas>

<main id="app">

  <!-- ЭКРАН ЗАГРУЗКИ -->
  <section class="screen screen--loading" id="screen-loading" data-active="true">
    <div class="loader-heart">♥</div>
  </section>

  <!-- ЭКРАН 1 -->
  <section class="screen" id="screen-1">
    <p class="eyebrow">У меня вопрос</p>
    <h1 class="title">Пойдёшь со мной<br>на свидание?</h1>
    <div class="btn-row" id="btn-row-1">
      <button class="btn btn--yes" id="btn-yes">Да</button>
      <button class="btn btn--no" id="btn-no">Нет</button>
    </div>
  </section>

  <!-- ЭКРАН 2 -->
  <section class="screen" id="screen-2">
    <div class="emoji-pop">🥹</div>
    <h2 class="title title--mid">Ооо, ты правда хочешь<br>пойти со мной на свидание?<br><span class="accent">Это круто.</span></h2>
    <button class="btn btn--yes" id="btn-next-2">Далее</button>
  </section>

  <!-- ЭКРАН 3 -->
  <section class="screen" id="screen-3">
    <p class="eyebrow">Шаг первый</p>
    <h2 class="title title--mid">Куда пойдём?</h2>
    <div class="cards" id="place-cards">
      <button class="card" data-place="Кино">
        <span class="card__icon">🎬</span>
        <span class="card__label">Кино</span>
      </button>
      <button class="card" data-place="Ресторан">
        <span class="card__icon">🍽️</span>
        <span class="card__label">Ресторан</span>
      </button>
      <button class="card" data-place="Прогулка">
        <span class="card__icon">🌆</span>
        <span class="card__label">Прогулка</span>
      </button>
      <button class="card" data-place="Кофе">
        <span class="card__icon">☕</span>
        <span class="card__label">Кофе</span>
      </button>
    </div>

    <div class="datetime-block" id="datetime-block">
      <p class="eyebrow">Шаг второй</p>
      <h2 class="title title--mid">Когда?</h2>
      <div class="field-row">
        <label class="field">
          <span class="field__label">Дата</span>
          <input type="date" id="input-date" class="field__input">
        </label>
        <label class="field">
          <span class="field__label">Время</span>
          <input type="time" id="input-time" class="field__input">
        </label>
      </div>
      <button class="btn btn--yes btn--wide" id="btn-submit" disabled>Отправить</button>
    </div>
  </section>

  <!-- ЭКРАН 4 -->
  <section class="screen" id="screen-4">
    <canvas id="confetti-canvas"></canvas>
    <div class="ticket">
      <p class="ticket__eyebrow">Приглашение принято</p>
      <h2 class="ticket__title">Увидимся скоро</h2>
      <div class="ticket__divider"></div>
      <div class="ticket__row">
        <span class="ticket__label">Место</span>
        <span class="ticket__value" id="result-place">—</span>
      </div>
      <div class="ticket__row">
        <span class="ticket__label">Дата</span>
        <span class="ticket__value" id="result-date">—</span>
      </div>
      <div class="ticket__row">
        <span class="ticket__label">Время</span>
        <span class="ticket__value" id="result-time">—</span>
      </div>
      <div class="ticket__heart">♥</div>
    </div>
  </section>

</main>

<script type="module" src="script.js"></script>
</body>
</html>
