<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Приглашение 💌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="bg-glow"></div>

  <!-- SCREEN 1 -->
  <section class="screen active" id="screen-1">
    <div class="screen-inner">
      <span class="deco-line"></span>
      <p class="eyebrow">Для тебя</p>
      <h1 class="hero-title">Пойдёшь<br>со мной<br><em>на свидание?</em></h1>
      <p class="hero-sub">У меня есть кое-что особенное&nbsp;для нас двоих</p>
      <div class="btns" id="btns-wrap">
        <button class="btn btn--yes" id="btn-yes">Да, конечно ✨</button>
        <button class="btn btn--no" id="btn-no">Нет</button>
      </div>
    </div>
  </section>

  <!-- SCREEN 2 -->
  <section class="screen" id="screen-2">
    <div class="screen-inner">
      <span class="big-emoji">🥹</span>
      <h2 class="section-title">Ооо, ты правда<br>хочешь пойти<br><em>со мной?</em></h2>
      <p class="section-text">Это просто невероятно…<br>Я уже так рад!</p>
      <button class="btn btn--primary" id="btn-s2">Продолжить →</button>
    </div>
  </section>

  <!-- SCREEN 3 -->
  <section class="screen" id="screen-3">
    <div class="screen-inner screen-inner--wide">
      <h2 class="section-title" style="margin-top:.5rem">Куда пойдём?</h2>
      <p class="section-text">Выбери место для нашего свидания</p>

      <div class="place-grid" id="place-grid">
        <button class="place-card" data-value="Кино">
          <span class="pc-icon">🎬</span>
          <span class="pc-name">Кино</span>
        </button>
        <button class="place-card" data-value="Ресторан">
          <span class="pc-icon">🍷</span>
          <span class="pc-name">Ресторан</span>
        </button>
        <button class="place-card" data-value="Прогулка">
          <span class="pc-icon">🌸</span>
          <span class="pc-name">Прогулка</span>
        </button>
        <button class="place-card" data-value="Пикник">
          <span class="pc-icon">🧺</span>
          <span class="pc-name">Пикник</span>
        </button>
        <button class="place-card" data-value="Кафе">
          <span class="pc-icon">☕</span>
          <span class="pc-name">Кафе</span>
        </button>
        <button class="place-card" data-value="Концерт">
          <span class="pc-icon">🎵</span>
          <span class="pc-name">Концерт</span>
        </button>
      </div>

      <div class="dt-wrap" id="dt-wrap">
        <div class="dt-row">
          <div class="dt-field">
            <label class="dt-label" for="inp-date">Дата</label>
            <input type="date" id="inp-date" class="dt-input">
          </div>
          <div class="dt-field">
            <label class="dt-label" for="inp-time">Время</label>
            <input type="time" id="inp-time" class="dt-input">
          </div>
        </div>
        <button class="btn btn--primary" id="btn-submit">Отправить 💌</button>
      </div>
    </div>
  </section>

  <!-- SCREEN 4 -->
  <section class="screen" id="screen-4">
    <canvas id="confetti-canvas"></canvas>
    <div class="screen-inner">
      <div class="ticket" id="ticket">
        <div class="ticket-top">
          <span class="orn">✦ &nbsp; ✦ &nbsp; ✦</span>
          <span class="ticket-label">Ты приглашена</span>
        </div>
        <div class="ticket-title">Свидание</div>
        <div class="ticket-divider">
          <span class="div-line"></span>
          <span class="div-heart">❤</span>
          <span class="div-line"></span>
        </div>
        <div class="ticket-details">
          <div class="ticket-row">
            <span class="ticket-key">Место</span>
            <span class="ticket-val" id="s-place">—</span>
          </div>
          <div class="ticket-row">
            <span class="ticket-key">Дата</span>
            <span class="ticket-val" id="s-date">—</span>
          </div>
          <div class="ticket-row">
            <span class="ticket-key">Время</span>
            <span class="ticket-val" id="s-time">—</span>
          </div>
        </div>
        <div class="ticket-footer">
          <p class="ticket-sign">Увидимся скоро 💌</p>
          <span class="orn" style="font-size:.65rem">✦</span>
        </div>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
